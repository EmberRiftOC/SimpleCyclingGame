<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhaustion Recovery Test</title>
  <style>
    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #00ff41;
      padding: 20px;
    }
    .test-panel {
      border: 2px solid #00ff41;
      padding: 20px;
      margin-bottom: 20px;
    }
    .energy-bar {
      width: 400px;
      height: 40px;
      border: 2px solid #00ff41;
      background: #1a1a1a;
      margin: 10px 0;
    }
    .energy-fill {
      height: 100%;
      background: #00ff41;
      transition: width 0.1s;
    }
    button {
      background: #00ff41;
      color: #000;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
    }
    .log {
      background: #1a1a1a;
      padding: 10px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 12px;
    }
    .log-entry {
      margin: 2px 0;
    }
    .log-error {
      color: #ff0066;
    }
    .log-success {
      color: #00ff41;
    }
  </style>
</head>
<body>
  <div class="test-panel">
    <h2>Exhaustion Recovery Test</h2>
    <div>
      <strong>Energy:</strong> <span id="energyValue">100</span> / 100
    </div>
    <div class="energy-bar">
      <div class="energy-fill" id="energyBar" style="width: 100%"></div>
    </div>
    <div>
      <strong>State:</strong> <span id="stateValue">Normal</span>
    </div>
    <div>
      <strong>Exhaustion Timer:</strong> <span id="timerValue">-</span>
    </div>
    <div>
      <strong>Frame:</strong> <span id="frameCount">0</span>
    </div>
    <div style="margin-top: 10px;">
      <button onclick="setEnergy(0)">Set Energy to 0</button>
      <button onclick="setEnergy(50)">Set Energy to 50</button>
      <button onclick="setEnergy(100)">Set Energy to 100</button>
      <button onclick="toggleSimulation()">Start/Stop Simulation</button>
      <button onclick="clearLog()">Clear Log</button>
    </div>
  </div>

  <div class="test-panel">
    <h3>Event Log</h3>
    <div class="log" id="log"></div>
  </div>

  <script>
    // Constants (same as game)
    const MAX_ENERGY = 100;
    const RECOVERY_TIME = 5000; // 5 seconds
    const RECOVERY_ENERGY = 50;
    const ENERGY_DRAIN_BASE = 0.08;
    const ENERGY_DRAIN_FAST = 0.3;
    const MIN_SPEED = 1.5;
    const MAX_SPEED = 6;
    const BASE_SPEED = 3;

    // State
    let energy = MAX_ENERGY;
    let isExhausted = false;
    let exhaustedStartTime = null;
    let speed = BASE_SPEED;
    let frameCount = 0;
    let simulationRunning = false;
    let simulationInterval = null;

    function log(message, type = 'normal') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[Frame ${frameCount}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateDisplay() {
      document.getElementById('energyValue').textContent = energy.toFixed(2);
      document.getElementById('energyBar').style.width = `${(energy / MAX_ENERGY) * 100}%`;
      document.getElementById('frameCount').textContent = frameCount;
      
      let state = 'Normal';
      if (isExhausted) {
        const elapsed = Date.now() - (exhaustedStartTime || 0);
        const remaining = Math.max(0, RECOVERY_TIME - elapsed);
        state = `Exhausted (${(remaining / 1000).toFixed(1)}s)`;
        document.getElementById('timerValue').textContent = `${(elapsed / 1000).toFixed(1)}s / ${RECOVERY_TIME / 1000}s`;
      } else {
        document.getElementById('timerValue').textContent = '-';
      }
      document.getElementById('stateValue').textContent = state;
    }

    function simulateFrame() {
      frameCount++;
      
      // EXACT LOGIC FROM GAME
      const now = Date.now();
      
      // Handle exhaustion recovery BEFORE energy management
      if (energy <= 0 && !isExhausted) {
        isExhausted = true;
        exhaustedStartTime = now;
        log('⚠️ Became exhausted (energy hit 0)', 'error');
      }
      
      if (isExhausted && exhaustedStartTime && now - exhaustedStartTime >= RECOVERY_TIME) {
        const oldEnergy = energy;
        energy = RECOVERY_ENERGY;
        isExhausted = false;
        exhaustedStartTime = null;
        log(`✅ Recovery complete! Energy: ${oldEnergy.toFixed(2)} → ${energy.toFixed(2)}`, 'success');
      }
      
      // Energy drain (runs every frame if energy > 0)
      if (energy > 0) {
        const speedFactor = (speed - MIN_SPEED) / (MAX_SPEED - MIN_SPEED);
        const drain = ENERGY_DRAIN_BASE + (speedFactor * ENERGY_DRAIN_FAST);
        const oldEnergy = energy;
        energy -= drain;
        
        if (frameCount % 60 === 0 || oldEnergy > 0 && energy <= 0) {
          log(`Energy drain: ${oldEnergy.toFixed(2)} → ${energy.toFixed(2)} (drain: ${drain.toFixed(4)})`);
        }
      }
      
      energy = Math.max(0, energy);
      
      updateDisplay();
    }

    function setEnergy(value) {
      energy = value;
      log(`🔧 Manually set energy to ${value}`);
      updateDisplay();
    }

    function toggleSimulation() {
      simulationRunning = !simulationRunning;
      
      if (simulationRunning) {
        log('▶️ Simulation started', 'success');
        simulationInterval = setInterval(simulateFrame, 1000 / 60); // 60 FPS
      } else {
        log('⏸️ Simulation paused', 'error');
        clearInterval(simulationInterval);
      }
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Initial display
    updateDisplay();
    log('Test initialized. Click "Set Energy to 0" then "Start Simulation" to test recovery.');
  </script>
</body>
</html>
